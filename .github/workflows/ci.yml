name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container: swift:6.0.3
    steps:
      - uses: actions/checkout@v6
      - name: Build (warnings as errors)
        run: swift build -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test
